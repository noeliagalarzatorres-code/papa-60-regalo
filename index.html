<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Sorpresa Papá 60</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#84fab0,#8fd3f4);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* TARJETA PRINCIPAL */
.card{
background:white;
width:92%;
max-width:450px;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* IMÁGENES */
img{
width:100%;
border-radius:20px;
margin:10px 0;
}

/* BOTONES */
button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
background:#ff7b54;
color:white;
cursor:pointer;
}

/* PROGRESO */
.progress{
font-size:14px;
color:#555;
margin-bottom:10px;
}

/* EFECTO PRESENTACIÓN */
.fade-in{
animation:fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.97);}
to{opacity:1;transform:scale(1);}
}

/* PANTALLA FINAL */
.result-screen{
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
border-radius:25px;
padding:25px;
}

</style>
</head>

<body>

<div class="card" id="app">

<!-- INTRO -->
<h1>🎉 Feliz Cumpleaños Papá 🎉</h1>

<p style="font-size:17px;line-height:1.5;">
❤️ Gracias por todos estos años de esfuerzo, amor y dedicación.<br><br>
🎁 Hoy queremos regalarte una experiencia inolvidable<br><br>
✨ Preparado con mucho amor por tus hijos
</p>

<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659">

<button onclick="start()">😏 ¿ESTÁS LISTO PARA ELEGIR TU DESTINO?</button>

</div>

<script>

const questions = [

{q:"😌 En tu tiempo libre prefieres desconectar del ruido total",aU:1,aM:0},
{q:"🌊 Te gusta estar cerca del mar",aU:0,aM:1},
{q:"🏔️ Te atraen paisajes fríos y extremos",aU:1,aM:0},
{q:"🐋 Ver animales marinos en libertad te emociona",aU:0,aM:1},
{q:"🚶‍♂️ Te gusta caminar en la naturaleza",aU:1,aM:1},

{q:"🌬️ El frío no te molesta en un viaje",aU:1,aM:0},
{q:"☀️ Prefieres clima más templado",aU:0,aM:1},
{q:"🚢 Te gusta la idea de excursiones en barco",aU:0,aM:1},
{q:"🧭 Te gusta explorar lugares remotos",aU:1,aM:0},
{q:"🌅 Disfrutas paisajes tranquilos",aU:0,aM:1},

{q:"❄️ Ver nieve te emociona",aU:1,aM:0},
{q:"🌿 Prefieres naturaleza suave y relajada",aU:0,aM:1},
{q:"📸 Te gusta fotografiar paisajes impactantes",aU:1,aM:1},
{q:"😎 Prefieres planes tranquilos",aU:0,aM:1},
{q:"🎁 Te gustan las sorpresas inesperadas",aU:1,aM:0}

];

let i=0;
let scoreU=0;
let scoreM=0;

function start(){
load();
}

function load(){

let q=questions[i];

document.getElementById("app").innerHTML=`

<div class="progress">Pregunta ${i+1} / ${questions.length}</div>

<h2>${q.q}</h2>

<button onclick="ans(1)">Sí</button>
<button onclick="ans(0)">No</button>

`;

}

function ans(v){

if(v===1){
scoreU+=questions[i].aU;
scoreM+=questions[i].aM;
}

i++;

if(i<questions.length){
load();
}else{
result();
}

}

function result(){

if(scoreU > scoreM){

document.getElementById("app").innerHTML=`

<div class="result-screen fade-in">

<h1>🎉 TE VAS A USHUAIA ❄️</h1>

<img src="https://raw.githubusercontent.com/noeliagalarzatorres-code/papa-60-regalo/main/NPX8550-1024x684.jpg">

<h2>❤️ Regalo de tus hijos</h2>

<p style="font-size:16px;line-height:1.6;">
Gracias por todo lo que hiciste y haces por nosotros, TE AMAMOS MUCHO.<br><br>
¡Y hoy queremos mimarte nosotros a vos! Este viaje incluye vuelos, hospedaje y excursiones para que disfrutes, descanses y vivas una experiencia inolvidable en el fin del mundo 🌎
</p>

</div>

`;

}else{

document.getElementById("app").innerHTML=`

<div class="result-screen fade-in">

<h1>🎉 TE VAS A PUERTO MADRYN 🌊</h1>

<img src="https://raw.githubusercontent.com/noeliagalarzatorres-code/papa-60-regalo/main/puerto-madryn_201608181112420.Mobile.jpeg">

<h2>❤️ Regalo de tus hijos</h2>

<p style="font-size:16px;line-height:1.6;">
Gracias por enseñarnos a amar tanto el mar y la arena. Este viaje incluye vuelos, hospedaje y excursiones, es un regalo para que disfrutes que el mar es aún mas increíble, y además el descanso que te mereces.<br><br>
TE AMAMOS MUCHO ❤️
</p>

</div>

`;

}

}

</script>

</body>
</html>
