<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Sorpresa Papá 60</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#84fab0,#8fd3f4);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
width:92%;
max-width:450px;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{font-size:26px;}
h2{font-size:20px;}

img{
width:100%;
border-radius:20px;
margin:10px 0;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
background:#ff7b54;
color:white;
cursor:pointer;
}

button:hover{
background:#ff5722;
}

.progress{
font-size:14px;
color:#555;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="card" id="app">

<!-- INTRO -->
<h1>🎉 Feliz Cumpleaños Papá 🎉</h1>

<p style="font-size:17px;line-height:1.5;">
❤️ Gracias por todo tu esfuerzo, amor y dedicación.<br><br>
🎁 Hoy queremos regalarte algo muy especial por tus 60 años<br><br>
✨ Prepárate para la sorpresa
</p>

<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659">

<button onclick="start()">😏 ¿ESTÁS LISTO?</button>

</div>

<script>

const questions = [

{q:"😌 En tu tiempo libre prefieres desconectar en silencio",s:1},
{q:"🌄 Te gusta descubrir lugares nuevos",s:1},
{q:"🌬️ El frío no es un problema si el lugar vale la pena",s:1},
{q:"🚶‍♂️ Disfrutas caminar aunque sea largo",s:1},
{q:"📸 Prefieres naturaleza antes que ciudad",s:1},

{q:"🌊 El mar te resulta relajante",s:0},
{q:"🏔️ Te atraen paisajes extremos",s:1},
{q:"🧭 Te gusta improvisar en los viajes",s:1},
{q:"☕ Un plan ideal es tranquilo y sin ruido",s:0},
{q:"❄️ Ver nieve te emociona",s:1},

{q:"🐋 Ver animales en libertad te gusta",s:0},
{q:"🚢 Un paseo en barco te interesa",s:1},
{q:"🌿 Te gusta estar lejos del ruido",s:1},
{q:"🌅 Prefieres paisajes naturales",s:1},
{q:"🎁 Te gustan las sorpresas inesperadas",s:1}

];

let i = 0;
let score = 0;

function start(){
load();
}

function load(){

let q = questions[i];

document.getElementById("app").innerHTML = `

<div class="progress">Pregunta ${i+1} / ${questions.length}</div>

<h2>${q.q}</h2>

<button onclick="ans(1)">Sí</button>
<button onclick="ans(0)">No</button>

`;

}

function ans(v){

score += v;
i++;

if(i < questions.length){
load();
}else{
result();
}

}

function result(){

if(score >= 8){

document.getElementById("app").innerHTML = `

<h1>🎉 TE VAS A USHUAIA ❄️</h1>

<img src="https://images.unsplash.com/photo-1580674285054-bed31e145f59">

<h2>❤️ Regalo de tus hijos</h2>

<p>Aventura en el fin del mundo 🌎</p>

`;

}else{

document.getElementById("app").innerHTML = `

<h1>🎉 TE VAS A PUERTO MADRYN 🌊</h1>

<img src="https://images.unsplash.com/photo-1516026672322-bc52d61a55d5">

<h2>❤️ Regalo de tus hijos</h2>

<p>Naturaleza y mar 🐋</p>

`;

}

}

</script>

</body>
</html>
