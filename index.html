<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Sorpresa Papá 60 🎁</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#84fab0,#8fd3f4);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
width:92%;
max-width:450px;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{font-size:28px;}
h2{font-size:22px;}

img{
width:100%;
border-radius:20px;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:15px;
background:#ff7b54;
color:white;
}

button:hover{
background:#ff5722;
}

.progress{
font-size:14px;
color:#555;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="card" id="quiz">

<h1>🎉 Feliz Cumpleaños Papá 🎉</h1>

<p>
❤️ Gracias por todo lo que hiciste por nosotros<br><br>
🎁 Hoy te espera una sorpresa especial por tus 60 años
</p>

<button onclick="startQuiz()">😏 ¿ESTÁS LISTO?</button>

</div>

<script>

const questions = [

{q:"😎 ¿Qué plan prefieres?",
img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
a:[{t:"🏔️ Aventura",s:1},{t:"🌊 Relax",s:0}]},

{q:"🧊 ¿Frío o calor?",
img:"https://images.unsplash.com/photo-1483664852095-d6cc6870702d",
a:[{t:"❄️ Frío",s:1},{t:"☀️ Calor",s:0}]},

{q:"📸 Foto ideal",
img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
a:[{t:"🏔️ Montañas",s:1},{t:"🌊 Mar",s:0}]},

{q:"🥾 Actividad",
img:"https://images.unsplash.com/photo-1527631746610-bca00a040d60",
a:[{t:"🚶‍♂️ Explorar",s:1},{t:"🧘‍♂️ Descansar",s:0}]},

{q:"🌎 ¿Qué te emociona?",
img:"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b",
a:[{t:"Aventura",s:1},{t:"Tranquilidad",s:0}]},

{q:"🚢 ¿Viaje ideal?",
img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
a:[{t:"Explorar",s:1},{t:"Relajarse",s:0}]},

{q:"🐋 ¿Naturaleza?",
img:"https://images.unsplash.com/photo-1500534623283-312aade485b7",
a:[{t:"Sí",s:1},{t:"Poco",s:0}]},

{q:"🌄 Paisaje favorito",
img:"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429",
a:[{t:"Montaña",s:1},{t:"Costa",s:0}]},

{q:"❄️ Clima extremo?",
img:"https://images.unsplash.com/photo-1483664852095-d6cc6870702d",
a:[{t:"Me gusta",s:1},{t:"No tanto",s:0}]},

{q:"🚶‍♂️ Caminatas",
img:"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
a:[{t:"Sí",s:1},{t:"No mucho",s:0}]},

{q:"📍 Destino ideal",
img:"https://images.unsplash.com/photo-1506744038136-46273834b3fb",
a:[{t:"Aventura",s:1},{t:"Relax",s:0}]},

{q:"🌊 Mar o montaña",
img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
a:[{t:"Montaña",s:1},{t:"Mar",s:0}]},

{q:"☕ Momento ideal",
img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",
a:[{t:"Frío y café",s:1},{t:"Sol y mate",s:0}]},

{q:"🌎 Experiencia",
img:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
a:[{t:"Única",s:1},{t:"Tranquila",s:0}]},

{q:"🎁 Última pregunta",
img:"https://images.unsplash.com/photo-1513151233558-d860c5398176",
a:[{t:"Aventura total",s:1},{t:"Paz total",s:0}]}

];

let i=0;
let score=0;

function startQuiz(){
load();
}

function load(){

const q=questions[i];

document.getElementById("quiz").innerHTML=`

<div class="progress">Pregunta ${i+1} de ${questions.length}</div>

<img src="${q.img}">

<h2>${q.q}</h2>

<div id="answers"></div>

`;

const a=document.getElementById("answers");

q.a.forEach(o=>{

const b=document.createElement("button");

b.innerHTML=o.t;

b.onclick=()=>{

score+=o.s;
i++;

if(i<questions.length){
load();
}else{
result();
}

};

a.appendChild(b);

});

}

function result(){

if(score>=8){

document.getElementById("quiz").innerHTML=`

<h1>🎉 TE VAS A USHUAIA ❄️</h1>

<img src="https://images.unsplash.com/photo-1580674285054-bed31e145f59">

<h2>🎁 Regalo de tus hijos ❤️</h2>

<p>Aventura en el fin del mundo 🌎</p>

`;

}else{

document.getElementById("quiz").innerHTML=`

<h1>🎉 TE VAS A PUERTO MADRYN 🌊</h1>

<img src="https://images.unsplash.com/photo-1516026672322-bc52d61a55d5">

<h2>🎁 Regalo de tus hijos ❤️</h2>

<p>Naturaleza y ballenas 🐋</p>

`;

}

}

</script>

</body>
</html>
