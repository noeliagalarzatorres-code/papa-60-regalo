<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Sorpresa Papá</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#84fab0,#8fd3f4);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
width:92%;
max-width:450px;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

img{width:100%;border-radius:20px;margin:10px 0;}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:12px;
background:#ff7b54;
color:white;
}
</style>
</head>

<body>

<div class="card" id="app">

<!-- PANTALLA INICIAL -->
<h1>🎉 Feliz Cumpleaños Papá 🎉</h1>

<p style="font-size:18px;line-height:1.5;">
❤️ Gracias por todos estos años de esfuerzo, amor y dedicación.<br><br>
Hoy queremos devolverte un poquito de todo lo que nos diste.<br><br>
🎁 Preparamos una sorpresa especial por tus 60 años.
</p>

<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659">

<button onclick="start()">😏 ¿ESTÁS LISTO?</button>

</div>

<script>

const questions = [
{q:"¿Aventura o relax?",s:1},
{q:"¿Te gusta el frío?",s:1},
{q:"¿Montaña?",s:1},
{q:"¿Explorar?",s:1},
{q:"¿Viajar lejos?",s:1},
{q:"¿Paisajes extremos?",s:1},
{q:"¿Naturaleza marina?",s:0},
{q:"¿Navegar?",s:1},
{q:"¿Clima frío?",s:1},
{q:"¿Amaneceres?",s:1},
{q:"¿Invierno?",s:1},
{q:"¿Naturaleza?",s:1},
{q:"¿Explorar lugares?",s:1},
{q:"¿Mar tranquilo?",s:0},
{q:"¿Listo para sorpresa?",s:1}
];

let i=0;
let score=0;

function start(){
render();
}

function render(){

let q = questions[i];

document.getElementById("app").innerHTML=`

<h3>Pregunta ${i+1} / ${questions.length}</h3>

<h2>${q.q}</h2>

<button onclick="ans(1)">Sí</button>
<button onclick="ans(0)">No</button>

`;

}

function ans(v){

score += v;
i++;

if(i<questions.length){
render();
}else{
finish();
}

}

function finish(){

let result = score >= 8 ? "USHUAIA ❄️" : "PUERTO MADRYN 🌊";

document.getElementById("app").innerHTML=`

<h1>🎉 ${result}</h1>

<img src="https://images.unsplash.com/photo-1580674285054-bed31e145f59">

<p>❤️ Regalo de tus hijos</p>

`;

}

</script>

</body>
</html>
